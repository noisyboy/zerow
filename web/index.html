<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Width Steganography</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111;
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ea;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 40px;
        }

        .container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--neon-magenta);
            border-radius: 4px;
            padding: 20px;
            flex: 1;
            box-shadow: 0 0 15px rgba(255, 0, 234, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-header {
            color: var(--neon-magenta);
            font-size: 1.2em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--neon-magenta);
            padding-bottom: 10px;
            margin-bottom: 10px;
            text-shadow: 0 0 5px var(--neon-magenta);
        }

        label {
            font-size: 0.9em;
            color: var(--neon-cyan);
        }

        textarea, input {
            background-color: #000;
            border: 1px solid #333;
            color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            border-radius: 2px;
            resize: vertical;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
        }

        button {
            background-color: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        
        .output-box {
            background-color: #000;
            border: 1px dashed var(--neon-magenta);
            padding: 15px;
            min-height: 80px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <h1>Neural // Stego // Interface</h1>

    <div class="container">
        <div class="panel">
            <div class="panel-header">Encoder // Write</div>
            
            <label>Carrier String</label>
            <input type="text" id="enc-carrier" placeholder="e.g., Hello World" value="Hello World">
            
            <label>Payload (Text/Script)</label>
            <textarea id="enc-payload" rows="6" placeholder="Enter data to hide..."></textarea>
            
            <button onclick="encodeData()">Initialize Encoding</button>
            
            <label>Weaponized Output (Copy this)</label>
            <div class="output-box" id="enc-output"></div>
        </div>

        <div class="panel">
            <div class="panel-header">Decoder // Extract</div>
            
            <label>Weaponized Carrier</label>
            <textarea id="dec-carrier" rows="6" placeholder="Paste text containing zero-width data..."></textarea>
            
            <button style="border-color: var(--neon-magenta); color: var(--neon-magenta);" onmouseover="this.style.backgroundColor='var(--neon-magenta)'; this.style.color='#000';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--neon-magenta)';" onclick="decodeData()">Initialize Extraction</button>
            
            <label>Extracted Payload</label>
            <div class="output-box" id="dec-output" style="border-color: var(--neon-cyan);"></div>
        </div>
    </div>

    <script>
        // Structural Constants
        const ZERO_CHAR = '\u200B';
        const ONE_CHAR = '\u200C';

        function encodeData() {
            const carrier = document.getElementById('enc-carrier').value;
            const payload = document.getElementById('enc-payload').value;
            
            if (!payload || !carrier) {
                alert("Both Carrier and Payload are required.");
                return;
            }

            // 1. Convert payload to binary string
            let binaryStream = '';
            for (let i = 0; i < payload.length; i++) {
                // Get ASCII/UTF-16 value, convert to binary, pad to 8 bits
                binaryStream += payload.charCodeAt(i).toString(2).padStart(8, '0');
            }

            // 2. Map binary to zero-width characters
            let invisiblePayload = '';
            for (let i = 0; i < binaryStream.length; i++) {
                invisiblePayload += (binaryStream[i] === '1') ? ONE_CHAR : ZERO_CHAR;
            }

            // 3. Inject into carrier (splitting it in the middle for better evasion)
            const splitIndex = Math.floor(carrier.length / 2);
            const weaponized = carrier.slice(0, splitIndex) + invisiblePayload + carrier.slice(splitIndex);

            document.getElementById('enc-output').innerText = weaponized;
        }

        function decodeData() {
            const weaponized = document.getElementById('dec-carrier').value;
            
            // 1. Filter out visible characters
            let hiddenData = '';
            for (let i = 0; i < weaponized.length; i++) {
                if (weaponized[i] === ZERO_CHAR || weaponized[i] === ONE_CHAR) {
                    hiddenData += weaponized[i];
                }
            }

            if (!hiddenData) {
                document.getElementById('dec-output').innerText = "[!] No zero-width data detected.";
                return;
            }

            // 2. Reconstruct binary stream
            let binaryStream = '';
            for (let i = 0; i < hiddenData.length; i++) {
                binaryStream += (hiddenData[i] === ONE_CHAR) ? '1' : '0';
            }

            // 3. Convert binary chunks back to characters
            let extractedPayload = '';
            for (let i = 0; i < binaryStream.length; i += 8) {
                const byte = binaryStream.slice(i, i + 8);
                if (byte.length === 8) {
                    extractedPayload += String.fromCharCode(parseInt(byte, 2));
                }
            }

            document.getElementById('dec-output').innerText = extractedPayload;
        }
    </script>
</body>
</html>
